<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Уход за волосами</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: #f6ecfb;
    --card: #ffffff;
    --text: #5a4a6b;
    --title: #6b4c8a;
    --hint: #9b7bb8;
    --muted: #b09ec2;
    --accent: #a273d6;
    --accent2: #c8a8e9;
    --soft: #efe2f7;
    --shadow: 0 3px 12px rgba(155,110,200,0.10);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, "SF Pro", "Segoe UI", Roboto, sans-serif;
    padding-bottom: 24px;
  }
  header { padding: 18px 18px 10px; }
  h1 { font-size: 17px; margin: 0 0 14px; font-weight: 500; color: var(--title); }
  .progress-wrap { background: var(--card); border-radius: 18px; padding: 16px; box-shadow: var(--shadow); }
  .progress-top { display:flex; justify-content:space-between; font-size:13px; color:var(--hint); margin-bottom:10px; }
  .progress-top b { color: var(--accent); font-weight: 500; }
  .bar { height: 10px; background: var(--soft); border-radius: 8px; overflow:hidden; }
  .bar > i { display:block; height:100%; width:0%; background: linear-gradient(90deg,var(--accent2),var(--accent)); border-radius:8px; transition: width .45s ease; }
  main { padding: 6px 18px 18px; }
  .tab { display:none; }
  .tab.active { display:block; }
  .card { background: var(--card); border-radius: 18px; padding: 15px 17px; margin-bottom: 10px; box-shadow: var(--shadow); }
  .card h3 { margin:0 0 6px; font-size:15px; font-weight:500; color: var(--title); }
  .card .meta { font-size:12.5px; color:var(--hint); white-space:pre-wrap; line-height:1.5; }
  .empty { color: var(--muted); text-align:center; padding: 46px 14px; font-size:14px; line-height:1.6; }
  .day-title { font-size:12px; color:var(--accent); margin: 12px 2px 8px; font-weight:500; letter-spacing:.4px; text-transform:uppercase; }
  .task { display:flex; align-items:center; gap:12px; background:var(--card); border-radius:14px; padding:13px 15px; margin-bottom:9px; box-shadow:var(--shadow); cursor:pointer; }
  .task .box { width:24px; height:24px; border-radius:8px; border:2px solid #d9c5ea; flex:0 0 auto; display:flex; align-items:center; justify-content:center; transition:.2s; }
  .task.done .box { background:var(--accent); border-color:var(--accent); }
  .task .box svg { width:14px; height:14px; opacity:0; transition:.2s; }
  .task.done .box svg { opacity:1; }
  .task .t { font-size:14px; line-height:1.35; color: var(--text); }
  .task.done .t { color:var(--muted); text-decoration:line-through; }
  .btn { display:block; width:100%; border:none; border-radius:14px; padding:15px; font-size:15px; font-weight:500;
         background:linear-gradient(90deg,var(--accent2),var(--accent)); color:#fff; cursor:pointer; margin-top:6px; box-shadow:0 4px 12px rgba(162,115,214,0.28); }
  .btn.secondary { background: var(--card); color: var(--accent); box-shadow: var(--shadow); }
  .chat { display:flex; flex-direction:column; gap:9px; overflow-y:auto; flex:1; padding:2px 0 8px; }
  .msg { max-width:82%; padding:11px 14px; border-radius:16px; font-size:14px; line-height:1.4; white-space:pre-wrap; box-shadow:var(--shadow); }
  .msg.user { align-self:flex-end; background:linear-gradient(90deg,var(--accent2),var(--accent)); color:#fff; border-bottom-right-radius:5px; box-shadow:none; }
  .msg.assistant { align-self:flex-start; background:var(--card); color:var(--text); border-bottom-left-radius:5px; }
  /* Когда открыта вкладка чата — фиксируем высоту окна, поле ввода прижато к низу контейнера */
  body.chat-mode { padding-bottom:0; overflow:hidden; }
  body.chat-mode header { display:none; }
  #tab-chat.active { display:flex; flex-direction:column; height:100dvh; padding:10px 18px 8px; }
  .chat-head { display:flex; align-items:center; justify-content:space-between; }
  .cos-toggle { width:38px; height:38px; border-radius:12px; border:none; cursor:pointer;
                background:var(--soft); color:var(--muted); display:flex; align-items:center; justify-content:center; transition:.2s; }
  .cos-toggle.on { background:linear-gradient(135deg,var(--accent2),var(--accent)); color:#fff; box-shadow:0 3px 10px rgba(162,115,214,.35); }
  .chat-input { display:flex; gap:8px; padding-top:8px; }
  .chat-input input { flex:1; border:none; border-radius:22px; padding:12px 16px; background:var(--card); color:var(--text); font-size:16px; outline:none; box-shadow:var(--shadow); }
  .chat-input button { border:none; border-radius:22px; padding:0 18px; background:linear-gradient(90deg,var(--accent2),var(--accent)); color:#fff; font-weight:500; cursor:pointer; font-size:16px; }
  .tiles { display:grid; grid-template-columns:1fr 1fr; gap:14px; padding:14px 4px 0; }
  .tile { aspect-ratio:1/1; background:var(--card); border:none; border-radius:22px; box-shadow:var(--shadow);
          display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px;
          font-size:15px; font-weight:500; color:var(--title); cursor:pointer; transition:transform .12s; }
  .tile:active { transform:scale(0.96); }
  .tile .tico { width:64px; height:64px; border-radius:18px; background:var(--soft); display:flex; align-items:center; justify-content:center; }
  .tile .tico svg { width:42px; height:42px; }
  .back { background:none; border:none; color:var(--accent); font-size:15px; font-weight:500; cursor:pointer; padding:4px 2px 10px; }
  .chips { display:flex; flex-wrap:wrap; gap:8px; }
  .chip { border:none; border-radius:20px; padding:9px 14px; font-size:13px; cursor:pointer; background:var(--card); color:var(--text); box-shadow:var(--shadow); transition:.15s; }
  .chip.on { background:linear-gradient(135deg,var(--accent2),var(--accent)); color:#fff; }
  .lock { text-align:center; padding:50px 22px; color:var(--hint); line-height:1.6; }
  .lock .big { width:72px; height:72px; margin:0 auto 14px; }
  .spinner { text-align:center; color:var(--muted); padding:34px; font-size:14px; }
</style>
</head>
<body>
<header>
  <h1 id="title">Уход за волосами ✦</h1>
  <div class="progress-wrap">
    <div class="progress-top"><span>Прогресс недели</span><b id="pct">0%</b></div>
    <div class="bar"><i id="barfill"></i></div>
  </div>
</header>

<main>
  <!-- Главный экран: 4 плитки 2×2 -->
  <section id="home">
    <div class="tiles">
      <button class="tile" data-tab="progress">
        <span class="tico"><svg viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" fill="#ece0f7"/><path d="M9 24a15 15 0 1 1 6 12" stroke="#a273d6" stroke-width="4" stroke-linecap="round"/><rect x="17" y="26" width="3.6" height="6" rx="1.5" fill="#b98fe0"/><rect x="22.5" y="22" width="3.6" height="10" rx="1.5" fill="#b98fe0"/><rect x="28" y="18" width="3.6" height="14" rx="1.5" fill="#b98fe0"/><path d="M17 24l5-4 5-3 4-4" stroke="#a273d6" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M27 12h5v5" stroke="#a273d6" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg></span>Прогресс</button>
      <button class="tile" data-tab="plan">
        <span class="tico"><svg viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" fill="#f0e7f9"/><rect x="14" y="13" width="20" height="22" rx="5" fill="#fff"/><rect x="18" y="19" width="13" height="2.6" rx="1.3" fill="#b98fe0"/><rect x="18" y="24" width="13" height="2.6" rx="1.3" fill="#b98fe0"/><rect x="18" y="29" width="8" height="2.6" rx="1.3" fill="#b98fe0"/><path d="M27 31l3 3 6-6" stroke="#a273d6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></span>План</button>
      <button class="tile" data-tab="cosmetics">
        <span class="tico"><svg viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" fill="#f0e7f9"/><rect x="19" y="11" width="10" height="5" rx="2" fill="#b98fe0"/><rect x="17" y="16" width="14" height="22" rx="6" fill="#fff"/><rect x="17" y="24" width="14" height="14" rx="6" fill="#dcc8ef"/><circle cx="34" cy="20" r="2" fill="#c8a8e9"/><circle cx="13" cy="30" r="1.6" fill="#c8a8e9"/></svg></span>Косметика</button>
      <button class="tile" data-tab="chat">
        <span class="tico"><svg viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" fill="#e9e4fb"/><path d="M14 22c0-5 5-9 11-9s11 4 11 9-5 9-11 9c-1.4 0-2.7-.2-4-.5L16 33l1.3-4.2C15.2 27.2 14 24.7 14 22z" fill="#8b7fe0"/><circle cx="20" cy="22" r="1.8" fill="#efe7ff"/><circle cx="25" cy="22" r="1.8" fill="#efe7ff"/><circle cx="30" cy="22" r="1.8" fill="#efe7ff"/></svg></span>Чат</button>
      <button class="tile" data-tab="ingredients">
        <span class="tico"><svg viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" fill="#efe2f7"/><path d="M21 13h6v8l6 11a3 3 0 0 1-2.6 4.5H17.6A3 3 0 0 1 15 32l6-11v-8z" fill="#fff" stroke="#a273d6" stroke-width="2"/><path d="M18 28h12l2.5 4.5A2 2 0 0 1 30.7 36H17.3A2 2 0 0 1 15.5 32.5L18 28z" fill="#dcc8ef"/><circle cx="24" cy="32" r="1.6" fill="#b98fe0"/><circle cx="21" cy="30" r="1.1" fill="#b98fe0"/><circle cx="34" cy="20" r="2" fill="#c8a8e9"/><circle cx="14" cy="24" r="1.6" fill="#c8a8e9"/></svg></span>Ингредиенты</button>
    </div>
  </section>

  <section class="tab" id="tab-progress">
    <button class="back" data-back>‹ Назад</button>
    <div id="tasks-area"><div class="spinner">Загрузка…</div></div>
  </section>
  <section class="tab" id="tab-plan">
    <button class="back" data-back>‹ Назад</button>
    <div id="plan-area"><div class="spinner">Загрузка…</div></div>
  </section>
  <section class="tab" id="tab-cosmetics">
    <button class="back" data-back>‹ Назад</button>
    <div id="cos-area"><div class="spinner">Загрузка…</div></div>
  </section>
  <section class="tab" id="tab-chat">
    <div class="chat-head">
      <button class="back" data-back>‹ Назад</button>
      <button id="cosToggle" class="cos-toggle" title="Учитывать мои средства">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none"><rect x="9" y="2" width="6" height="3.5" rx="1.2" fill="currentColor"/><rect x="7.5" y="5.5" width="9" height="15" rx="3.5" fill="currentColor" opacity="0.85"/></svg>
      </button>
    </div>
    <div class="chat" id="chat-area"></div>
    <div class="chat-input" id="chat-input">
      <input id="chat-text" placeholder="Спросите эксперта…" autocomplete="off">
      <button id="chat-send">→</button>
    </div>
  </section>
  <section class="tab" id="tab-ingredients">
    <button class="back" data-back>‹ Назад</button>
    <div id="ingr-area"><div class="spinner">Загрузка…</div></div>
  </section>
</main>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); try { tg.disableVerticalSwipes?.(); } catch(e){} }
const INIT = tg?.initData || "";
let isPremium = false;
const CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.2"><path d="M5 12l5 5L20 6" stroke-linecap="round" stroke-linejoin="round"/></svg>';
const LOCK = '<svg viewBox="0 0 48 48" fill="none"><rect x="12" y="22" width="24" height="18" rx="5" fill="#dcc8ef"/><path d="M17 22v-4a7 7 0 0 1 14 0v4" stroke="#a273d6" stroke-width="3.4" stroke-linecap="round"/><circle cx="24" cy="30" r="2.6" fill="#a273d6"/></svg>';

async function api(path, extra={}) {
  const res = await fetch(path, { method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ init_data: INIT, ...extra }) });
  if (!res.ok) throw new Error("HTTP " + res.status);
  return res.json();
}
function setProgress(p){ document.getElementById("pct").textContent=(p||0)+"%"; document.getElementById("barfill").style.width=(p||0)+"%"; }

document.querySelectorAll(".tile").forEach(b => b.addEventListener("click", () => switchTab(b.dataset.tab)));
document.querySelectorAll("[data-back]").forEach(b => b.addEventListener("click", goHome));

function goHome(){
  document.querySelectorAll(".tab").forEach(s=>s.classList.remove("active"));
  document.getElementById("home").style.display = "block";
  document.body.classList.remove("chat-mode");
  tg?.BackButton?.hide?.();
  loadTasks(); // обновить прогресс-бар на главном
}

function switchTab(name){
  document.getElementById("home").style.display = "none";
  document.querySelectorAll(".tab").forEach(s=>s.classList.remove("active"));
  document.getElementById("tab-"+name).classList.add("active");
  document.body.classList.toggle("chat-mode", name==="chat");
  if (tg?.BackButton) { tg.BackButton.show(); tg.BackButton.onClick(goHome); }
  if(name==="progress") loadTasks();
  if(name==="plan") loadPlan();
  if(name==="cosmetics") loadCosmetics();
  if(name==="chat") loadChat();
  if(name==="ingredients") loadIngredients();
}

function diagBlockHtml(p){
  const cur=p&&p.current!=null?p.current.toFixed(1):"—";
  let hist="";
  if(p&&p.history&&p.history.length){
    hist='<div class="day-title" style="margin-top:14px;">История диагностик</div>';
    p.history.forEach(h=>{
      hist+='<div style="display:flex;justify-content:space-between;font-size:13px;color:var(--muted);padding:6px 0;border-bottom:1px solid var(--soft);">'
        +'<span>'+esc(h.date||"")+'</span><b style="color:var(--accent);">'+(h.rating!=null?Number(h.rating).toFixed(1)+"/10":"—")+'</b></div>';
    });
  } else {
    hist='<div class="meta" style="color:var(--muted);margin-top:10px;">Диагностики ещё не было. Сделайте первую — и здесь появится ваш рейтинг и динамика.</div>';
  }
  const moreBtn=(p&&p.full_text)?'<button class="btn secondary" id="diag-more" style="margin-top:10px;">Подробнее ▾</button>'
    +'<div id="diag-full" style="display:none;margin-top:10px;"><div class="meta" style="white-space:pre-wrap;">'+esc(p.full_text)+'</div></div>':'';
  return '<div class="card" style="margin-bottom:14px;">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;">'
    +'<h3 style="margin:0;">Диагностика волос</h3>'
    +'<b style="color:var(--accent);font-size:20px;">'+cur+(cur!=="—"?'/10':'')+'</b></div>'
    +hist
    +moreBtn
    +'<button class="btn" id="diag-btn" style="margin-top:14px;">📸 Сделать диагностику</button>'
    +'</div>';
}

async function loadTasks(){
  const area=document.getElementById("tasks-area");
  let diagHtml="";
  try{ diagHtml=diagBlockHtml(await api("/api/progress")); }
  catch(e){ diagHtml=diagBlockHtml(null); }
  try{
    const d=await api("/api/tasks"); setProgress(d.percent);
    let html=diagHtml;
    if(!d.tasks.length){
      html+='<div class="empty">Плана пока нет.<br>Откройте «План» и нажмите «Составить план».</div>';
    } else {
      let last=-1;
      html+='<div class="day-title">Задания на сегодня</div>';
      d.tasks.forEach(t=>{ if(t.day!==last){ html+=`<div class="day-title">День ${t.day+1}</div>`; last=t.day; }
        html+=`<div class="task ${t.done?'done':''}" data-id="${t.id}"><div class="box">${CHECK}</div><div class="t">${esc(t.title)}</div></div>`; });
    }
    area.innerHTML=html;
    bindDiagBtn();
    area.querySelectorAll(".task").forEach(el=>{ el.addEventListener("click", async()=>{
      const id=el.dataset.id, nd=!el.classList.contains("done");
      el.classList.toggle("done", nd); tg?.HapticFeedback?.impactOccurred("light");
      try{ await api("/api/task_toggle",{task_id:Number(id),done:nd}); }catch(e){}
      loadTasks();
    }); });
  }catch(e){ area.innerHTML=diagHtml+'<div class="empty">Не удалось загрузить задания.</div>'; bindDiagBtn(); }
}

function bindDiagBtn(){
  const more=document.getElementById("diag-more");
  if(more) more.addEventListener("click",()=>{
    const f=document.getElementById("diag-full");
    const open=f.style.display!=="none";
    f.style.display=open?"none":"block";
    more.textContent=open?"Подробнее ▾":"Скрыть ▴";
  });
  const b=document.getElementById("diag-btn");
  if(!b) return;
  b.addEventListener("click", async()=>{
    b.disabled=true; b.textContent="Отправляю запрос…";
    try{
      const r=await api("/api/request_diagnosis");
      if(r.ok){
        b.textContent="✓ Проверьте чат с ботом";
        tg?.HapticFeedback?.notificationOccurred?.("success");
        setTimeout(()=>{ tg?.close?.(); }, 900);
      } else {
        b.textContent="Откройте чат с ботом и пришлите фото";
        b.disabled=false;
      }
    }catch(e){
      b.textContent="Не удалось. Попробуйте ещё раз";
      b.disabled=false;
    }
  });
}

const PLAN_BLOCKS=[["care","💧 Уход и мытьё"],["nutrition","🥗 Питание"],["supplements","💊 БАДы и витамины"],["masks","🧴 Маски и средства"],["styling","✂️ Стайлинг"]];
const PLAN_TERMS=[["change","Что изменить"],["week","На неделю"],["month","На месяц"]];

async function loadPlan(){
  const area=document.getElementById("plan-area");
  if(!isPremium){ area.innerHTML=lockHtml(); return; }
  try{
    const d=await api("/api/plan");
    if(!d.plan||!d.plan.days||!d.plan.days.length){
      area.innerHTML='<div class="empty">Плана ещё нет.</div><button class="btn" id="gen">Составить план</button>';
    } else {
      let html="";
      d.plan.days.forEach((day,i)=>{ html+=`<div class="day-title">${esc(day.day||("День "+(i+1)))}</div>`;
        (day.tasks||[]).forEach(t=>{ html+=`<div class="card"><div class="t" style="font-size:14px;color:var(--text)">${esc(t)}</div></div>`; }); });
      html+='<button class="btn secondary" id="gen">Составить заново</button>'; area.innerHTML=html;
    }
    const g=document.getElementById("gen"); if(g) g.addEventListener("click", planSetup);
  }catch(e){ area.innerHTML='<div class="empty">Не удалось загрузить.</div>'; }
}

function planSetup(){
  const area=document.getElementById("plan-area");
  let chips=PLAN_BLOCKS.map(([k,l])=>`<button class="chip on" data-b="${k}">${l}</button>`).join("");
  let terms=PLAN_TERMS.map(([k,l],i)=>`<button class="chip ${k==='week'?'on':''}" data-term="${k}">${l}</button>`).join("");
  area.innerHTML=`
    <div class="day-title">Что включить в план</div>
    <div class="chips" id="planBlocks">${chips}</div>
    <div class="day-title" style="margin-top:14px;">Срок</div>
    <div class="chips" id="planTerms">${terms}</div>
    <div class="day-title" style="margin-top:14px;">Пожелание (необязательно)</div>
    <textarea id="planWish" placeholder="Чего хотите добиться? Что важно?" style="width:100%;border:none;border-radius:14px;padding:12px 14px;background:var(--card);color:var(--text);font-size:14px;outline:none;box-shadow:var(--shadow);min-height:60px;resize:none;"></textarea>
    <button class="btn" id="planGo" style="margin-top:14px;">Составить план</button>
    <button class="btn secondary" id="planCancel" style="margin-top:8px;">Отмена</button>`;
  // мультивыбор блоков
  area.querySelectorAll('#planBlocks .chip').forEach(c=>c.addEventListener('click',()=>c.classList.toggle('on')));
  // один срок
  area.querySelectorAll('#planTerms .chip').forEach(c=>c.addEventListener('click',()=>{
    area.querySelectorAll('#planTerms .chip').forEach(x=>x.classList.remove('on')); c.classList.add('on');
  }));
  document.getElementById("planCancel").addEventListener("click", loadPlan);
  document.getElementById("planGo").addEventListener("click", genPlan);
}

async function genPlan(){
  const area=document.getElementById("plan-area");
  const blocks=[...area.querySelectorAll('#planBlocks .chip.on')].map(c=>c.dataset.b);
  const termEl=area.querySelector('#planTerms .chip.on');
  const term=termEl?termEl.dataset.term:"week";
  const wish=(document.getElementById("planWish")?.value||"").trim();
  if(!blocks.length){ tg?.showAlert?.("Выберите хотя бы одну тему"); return; }
  area.innerHTML='<div class="spinner">Составляю план… несколько секунд</div>';
  try{ await api("/api/plan_generate",{blocks, term, wish, use_cosmetics:useCosmetics}); loadPlan(); loadTasks(); }
  catch(e){ area.innerHTML='<div class="empty">Не удалось составить план.</div>'; }
}

let COS_ITEMS=[];
let COS_SOURCE="mine";
let COS_SELECT=false;          // режим выбора средств для совместимости
let COS_CHECKED=new Set();     // id выбранных средств
function cosShell(){
  const area=document.getElementById("cos-area");
  const seg=isPremium?(
    '<div style="display:flex;gap:6px;background:var(--soft);border-radius:12px;padding:4px;margin-bottom:12px;">'
    +'<button id="cos-mine" style="flex:1;border:none;border-radius:9px;padding:9px;font-size:13px;font-weight:500;cursor:pointer;background:'+(COS_SOURCE==="mine"?"#fff":"transparent")+';color:'+(COS_SOURCE==="mine"?"var(--accent)":"var(--muted)")+';box-shadow:'+(COS_SOURCE==="mine"?"var(--shadow)":"none")+';">Моя</button>'
    +'<button id="cos-all" style="flex:1;border:none;border-radius:9px;padding:9px;font-size:13px;font-weight:500;cursor:pointer;background:'+(COS_SOURCE==="all"?"#fff":"transparent")+';color:'+(COS_SOURCE==="all"?"var(--accent)":"var(--muted)")+';box-shadow:'+(COS_SOURCE==="all"?"var(--shadow)":"none")+';">Общая</button>'
    +'</div>'):'';
  const compatBtn=(isPremium && COS_SOURCE==="mine")?(
    '<button id="cos-compat" class="btn secondary" style="width:100%;margin-bottom:8px;">⚗ Проверить совместимость</button>'
    +'<div id="cos-compat-hint" style="display:'+(COS_SELECT?'block':'none')+';font-size:12px;color:var(--muted);text-align:center;margin-bottom:10px;">Отметьте средства галочками и нажмите ещё раз</div>'
    +'<div id="cos-compat-res" style="display:none;margin-bottom:12px;"></div>'):'';
  area.innerHTML=seg+compatBtn
    +'<input id="cos-search" placeholder="Поиск по названию…" autocomplete="off" style="width:100%;border:none;border-radius:14px;padding:12px 16px;margin-bottom:12px;background:var(--card);color:var(--text);font-size:14px;outline:none;box-shadow:var(--shadow);">'
    +'<div id="cos-list"><div class="spinner">Загрузка…</div></div>';
  const s=document.getElementById("cos-search");
  if(s) s.addEventListener("input",e=>renderCosList(e.target.value));
  if(isPremium){
    document.getElementById("cos-mine").addEventListener("click",()=>{ if(COS_SOURCE!=="mine"){COS_SOURCE="mine"; loadCosmetics();}});
    document.getElementById("cos-all").addEventListener("click",()=>{ if(COS_SOURCE!=="all"){COS_SOURCE="all"; loadCosmetics();}});
  }
  const cb=document.getElementById("cos-compat");
  if(cb) cb.addEventListener("click",runCompatibility);
}

async function runCompatibility(){
  const btn=document.getElementById("cos-compat");
  const res=document.getElementById("cos-compat-res");
  const hint=document.getElementById("cos-compat-hint");
  if(!btn||!res) return;
  // первый клик — включаем режим выбора галочек
  if(!COS_SELECT){
    COS_SELECT=true; COS_CHECKED.clear();
    if(hint) hint.style.display="block";
    btn.textContent="✓ Проверить выбранные";
    renderCosList(document.getElementById("cos-search")?.value||"");
    return;
  }
  const ids=[...COS_CHECKED];
  if(ids.length<2){
    res.style.display="block";
    res.innerHTML='<div class="card"><div class="meta">Отметьте минимум 2 средства галочками.</div></div>';
    return;
  }
  btn.disabled=true; btn.textContent="Анализирую…";
  res.style.display="block";
  res.innerHTML='<div class="card"><div class="meta" style="color:var(--muted);">Проверяю сочетаемость выбранных средств…</div></div>';
  try{
    const d=await api("/api/compatibility",{ids});
    if(d.empty){ res.innerHTML='<div class="card"><div class="meta">Нет данных по выбранным средствам.</div></div>'; }
    else{ res.innerHTML='<div class="card"><div class="meta" style="white-space:pre-wrap;">'+esc(d.result||"")+'</div></div>'; }
  }catch(e){
    res.innerHTML='<div class="card"><div class="meta">Не удалось проверить. Попробуйте ещё раз.</div></div>';
  }
  // сбрасываем режим выбора
  COS_SELECT=false; COS_CHECKED.clear();
  if(hint) hint.style.display="none";
  btn.disabled=false; btn.textContent="⚗ Проверить совместимость";
  renderCosList(document.getElementById("cos-search")?.value||"");
}
async function loadCosmetics(){
  cosShell();
  const list=document.getElementById("cos-list");
  try{
    const ep=COS_SOURCE==="all"?"/api/cosmetics_all":"/api/cosmetics";
    const d=await api(ep);
    COS_ITEMS=d.items||[];
    if(!COS_ITEMS.length){
      list.innerHTML='<div class="empty">'+(COS_SOURCE==="all"?"В общей базе пока пусто.":"Вы ещё не сканировали косметику.<br>Отправьте фото средства боту.")+'</div>';
      return;
    }
    renderCosList(document.getElementById("cos-search").value||"");
  }catch(e){ list.innerHTML='<div class="empty">Не удалось загрузить.</div>'; }
}
function renderCosList(q){
  const list=document.getElementById("cos-list"); if(!list) return;
  const f=(q||"").trim().toLowerCase();
  const items=f?COS_ITEMS.filter(it=>(it.name||"").toLowerCase().includes(f)):COS_ITEMS;
  if(!items.length){ list.innerHTML='<div class="empty">Ничего не найдено.</div>'; return; }
  const mine = COS_SOURCE==="mine";
  const selecting = COS_SELECT && mine;
  list.innerHTML=items.map(it=>`
    <div class="card cos-card" data-id="${it.id}" style="cursor:pointer;${selecting&&COS_CHECKED.has(it.id)?'outline:2px solid var(--accent);':''}">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;">
        ${selecting?`<span class="cos-check" style="width:22px;height:22px;flex:none;border-radius:7px;border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;background:${COS_CHECKED.has(it.id)?'var(--accent)':'transparent'};">${COS_CHECKED.has(it.id)?'✓':''}</span>`:''}
        <h3 style="margin:0;flex:1;">${esc(it.name)}</h3>
        <span class="chev" style="color:var(--muted);font-size:18px;">${selecting?'':'›'}</span>
      </div>
      <div class="cos-detail" style="display:none;margin-top:10px;">
        <div class="meta">${esc(it.summary||it.analysis||"")}</div>
        ${it.ingredients?`<button class="btn secondary cos-sub" data-k="ing" style="margin-top:10px;">Подробнее ▾</button>`:""}
        ${it.usage?`<button class="btn secondary cos-sub" data-k="use" style="margin-top:8px;">Как использовать</button>`:""}
        <div class="cos-sub-text" style="display:none;margin-top:10px;"></div>
        <div class="day-title" style="margin-top:14px;">Отзывы</div>
        <div class="cos-reviews"><div class="meta" style="color:var(--muted);">Загрузка…</div></div>
        <div style="display:flex;gap:8px;margin-top:8px;">
          <input class="rev-input" placeholder="Ваш отзыв…" style="flex:1;border:none;border-radius:14px;padding:10px 13px;background:var(--soft);color:var(--text);font-size:13px;outline:none;">
          <button class="rev-send" style="border:none;border-radius:14px;padding:0 14px;background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;font-weight:500;cursor:pointer;">→</button>
        </div>
        ${mine?`<button class="cos-del" style="margin-top:12px;width:100%;border:none;border-radius:12px;padding:11px;background:#f7e2e8;color:#b04a63;font-weight:500;cursor:pointer;">Удалить из моих</button>`:""}
      </div>
    </div>`).join("");
  list.querySelectorAll(".cos-card").forEach(card=>{
    const id=Number(card.dataset.id);
    const it=COS_ITEMS.find(x=>x.id===id);
    card.addEventListener("click",ev=>{
      if(ev.target.closest(".cos-sub")||ev.target.closest(".rev-input")||ev.target.closest(".rev-send")||ev.target.closest(".cos-del")) return;
      // режим выбора для совместимости — клик переключает галочку
      if(COS_SELECT && COS_SOURCE==="mine"){
        if(COS_CHECKED.has(id)) COS_CHECKED.delete(id); else COS_CHECKED.add(id);
        tg?.HapticFeedback?.selectionChanged?.();
        renderCosList(document.getElementById("cos-search")?.value||"");
        return;
      }
      const d=card.querySelector(".cos-detail");
      const open=d.style.display!=="none";
      d.style.display=open?"none":"block";
      card.querySelector(".chev").textContent=open?"›":"⌄";
      if(!open) loadReviews(card, it.name);
    });
    card.querySelectorAll(".cos-sub").forEach(btn=>{
      btn.addEventListener("click",()=>{
        const box=card.querySelector(".cos-sub-text");
        const txt=btn.dataset.k==="ing"?it.ingredients:it.usage;
        const label=btn.dataset.k==="ing"?"Состав":"Как использовать";
        box.style.display="block";
        box.innerHTML='<div class="day-title">'+label+'</div><div class="meta">'+esc(txt)+'</div>';
      });
    });
    const revSend=card.querySelector(".rev-send");
    if(revSend) revSend.addEventListener("click", async()=>{
      const inp=card.querySelector(".rev-input"); const t=inp.value.trim(); if(!t) return;
      inp.value="";
      try{ await api("/api/review_add",{name:it.name, text:t}); loadReviews(card, it.name); }catch(e){}
    });
    const del=card.querySelector(".cos-del");
    if(del) del.addEventListener("click", async()=>{
      try{ await api("/api/cosmetic_delete",{id:it.id}); loadCosmetics(); }catch(e){}
    });
  });
}

async function loadReviews(card, name){
  const box=card.querySelector(".cos-reviews"); if(!box) return;
  try{
    const d=await api("/api/reviews",{name});
    if(!d.reviews.length){ box.innerHTML='<div class="meta" style="color:var(--muted);">Пока нет отзывов.</div>'; return; }
    box.innerHTML=d.reviews.map(r=>`<div class="card" style="padding:9px 12px;margin:6px 0 0;"><div style="font-size:12px;color:var(--accent);">${esc(r.author)}</div><div class="meta">${esc(r.text)}</div></div>`).join("");
  }catch(e){ box.innerHTML=''; }
}

async function loadChat(){
  const input=document.getElementById("chat-input");
  if(!isPremium){ document.getElementById("chat-area").innerHTML=lockHtml(); input.style.display="none"; return; }
  input.style.display="flex";
  const area=document.getElementById("chat-area");
  try{
    const d=await api("/api/chat_history");
    area.innerHTML=d.messages.map(m=>`<div class="msg ${m.role}">${esc(m.content)}</div>`).join("");
    if(!d.messages.length) area.innerHTML='<div class="msg assistant">Здравствуйте! Спросите меня о ваших волосах, уходе или средствах.</div>';
    area.scrollTop=area.scrollHeight;
  }catch(e){}
}
let useCosmetics = false;
try { useCosmetics = localStorage.getItem("useCosmetics")==="1"; } catch(e){}
const cosBtn = document.getElementById("cosToggle");
function renderCosToggle(){ cosBtn.classList.toggle("on", useCosmetics); }
renderCosToggle();
cosBtn.addEventListener("click", ()=>{
  useCosmetics = !useCosmetics;
  try{ localStorage.setItem("useCosmetics", useCosmetics?"1":"0"); }catch(e){}
  renderCosToggle();
  tg?.HapticFeedback?.impactOccurred?.("light");
  const area=document.getElementById("chat-area");
  area.innerHTML += `<div class="msg assistant">${useCosmetics?"Теперь учитываю вашу косметику в ответах ✦":"Больше не учитываю вашу косметику."}</div>`;
  area.scrollTop=area.scrollHeight;
});

document.getElementById("chat-send").addEventListener("click", sendChat);
document.getElementById("chat-text").addEventListener("keydown", e=>{ if(e.key==="Enter") sendChat(); });
document.getElementById("chat-text").addEventListener("focus", ()=>{ setTimeout(()=>{ const a=document.getElementById("chat-area"); a.scrollTop=a.scrollHeight; }, 300); });
async function sendChat(){
  const input=document.getElementById("chat-text"), text=input.value.trim(); if(!text) return;
  const area=document.getElementById("chat-area");
  area.innerHTML+=`<div class="msg user">${esc(text)}</div>`; input.value=""; area.scrollTop=area.scrollHeight;
  const wait=document.createElement("div"); wait.className="msg assistant"; wait.textContent="…"; area.appendChild(wait); area.scrollTop=area.scrollHeight;
  try{ const d=await api("/api/chat",{message:text, use_cosmetics:useCosmetics}); wait.textContent=d.reply||"—"; }catch(e){ wait.textContent="Не удалось ответить."; }
  area.scrollTop=area.scrollHeight;
}

function lockHtml(){ return '<div class="lock"><div class="big">'+LOCK+'</div>Эта функция доступна по подписке Премиум.<br>Оформите её в боте, чтобы открыть план и чат с экспертом.</div>'; }
let INGR_ITEMS=[];
let INGR_CAT="all";
async function loadIngredients(){
  const area=document.getElementById("ingr-area");
  try{
    if(!INGR_ITEMS.length){
      const d=await api("/api/ingredients");
      INGR_ITEMS=d.items||[];
    }
    if(!INGR_ITEMS.length){ area.innerHTML='<div class="empty">База ингредиентов пока пуста.</div>'; return; }
    const cats=[]; INGR_ITEMS.forEach(it=>{ if(!cats.includes(it.category)) cats.push(it.category); });
    let chips='<div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px;">';
    chips+=ingrChip("all","Все");
    cats.forEach(c=>chips+=ingrChip(c,c));
    chips+='</div>';
    area.innerHTML=chips
      +'<input id="ingr-search" placeholder="Поиск ингредиента…" autocomplete="off" style="width:100%;border:none;border-radius:14px;padding:12px 16px;margin-bottom:12px;background:var(--card);color:var(--text);font-size:14px;outline:none;box-shadow:var(--shadow);">'
      +'<div id="ingr-list"></div>';
    document.querySelectorAll(".ingr-chip").forEach(b=>b.addEventListener("click",()=>{
      INGR_CAT=b.dataset.cat; loadIngredientsRender();
      document.querySelectorAll(".ingr-chip").forEach(x=>x.classList.remove("on"));
      b.classList.add("on");
    }));
    const s=document.getElementById("ingr-search");
    if(s) s.addEventListener("input",loadIngredientsRender);
    loadIngredientsRender();
  }catch(e){ area.innerHTML='<div class="empty">Не удалось загрузить.</div>'; }
}
function ingrChip(cat,label){
  const on=INGR_CAT===cat;
  return '<button class="ingr-chip'+(on?' on':'')+'" data-cat="'+esc(cat)+'" style="border:none;border-radius:20px;padding:8px 14px;font-size:13px;cursor:pointer;background:'+(on?'linear-gradient(135deg,var(--accent2),var(--accent))':'var(--card)')+';color:'+(on?'#fff':'var(--accent)')+';box-shadow:var(--shadow);">'+esc(label)+'</button>';
}
function loadIngredientsRender(){
  const list=document.getElementById("ingr-list"); if(!list) return;
  const q=(document.getElementById("ingr-search")?.value||"").trim().toLowerCase();
  let items=INGR_ITEMS;
  if(INGR_CAT!=="all") items=items.filter(it=>it.category===INGR_CAT);
  if(q) items=items.filter(it=>(it.name||"").toLowerCase().includes(q));
  if(!items.length){ list.innerHTML='<div class="empty">Ничего не найдено.</div>'; return; }
  list.innerHTML=items.map((it,idx)=>`
    <div class="card ingr-card" data-i="${idx}" style="cursor:pointer;">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;">
        <h3 style="margin:0;flex:1;">${it.emoji?it.emoji+" ":""}${esc(it.name)}</h3>
        <span class="chev" style="color:var(--muted);font-size:18px;">›</span>
      </div>
      <div class="ingr-detail" style="display:none;margin-top:10px;">
        <div class="meta"><b>Что это:</b> ${esc(it.what)}</div>
        <div class="meta" style="margin-top:8px;"><b>Влияние на волосы:</b> ${esc(it.effect)}</div>
        ${it.found_in?`<div class="meta" style="margin-top:8px;"><b>Где встречается:</b> ${esc(it.found_in)}</div>`:""}
      </div>
    </div>`).join("");
  list.querySelectorAll(".ingr-card").forEach(card=>{
    card.addEventListener("click",()=>{
      const d=card.querySelector(".ingr-detail");
      const open=d.style.display!=="none";
      d.style.display=open?"none":"block";
      card.querySelector(".chev").textContent=open?"›":"⌄";
    });
  });
}
function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

(async function init(){
  try{ const me=await api("/api/me"); isPremium=me.is_premium;
    if(me.first_name) document.getElementById("title").textContent=`${me.first_name}, добро пожаловать ✦`;
  }catch(e){}
  loadTasks();
})();
</script>
</body>
</html>
